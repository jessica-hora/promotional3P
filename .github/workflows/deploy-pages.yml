name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      - name: Copy build output
        run: |
          rm -rf docs
          mkdir docs
          cp -r frontend/dist/* docs/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
      - name: Configure public GitHub Pages source (optional)
        if: secrets.PAGES_TOKEN != ''
        run: |
          curl -L -X PUT \
            -H "Authorization: Bearer ${{ secrets.PAGES_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
      - name: Skip public GitHub Pages source configuration
        if: secrets.PAGES_TOKEN == ''
        run: |
          echo "Skipping public GitHub Pages source configuration because PAGES_TOKEN is not set."
          echo "The built site is still published privately to the gh-pages branch."
